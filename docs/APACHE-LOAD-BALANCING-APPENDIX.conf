# Apache Load Balancing Appendix
# Project: my-ecommerce-app
# Purpose: Keep all Apache proxy/balancer settings in one place for quick restoration
# and for inclusion as an appendix in the final project report.

# -----------------------------------------------------------------------------
# 1) Enable Apache proxy/load-balancing modules in httpd.conf
# -----------------------------------------------------------------------------
# Remove the leading # from these lines inside Apache (httpd.conf), then restart Apache.

LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_balancer_module modules/mod_proxy_balancer.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule lbmethod_byrequests_module modules/mod_lbmethod_byrequests.so

# -----------------------------------------------------------------------------
# 2) Load balancer virtual host for my-ecommerce-app.test
# -----------------------------------------------------------------------------
# Place this block inside httpd-vhosts.conf (or the equivalent VirtualHost include).
# The balancer distributes traffic between Apache on 8000 and Laravel Serve on 8080.

<Proxy "balancer://mycluster">
    BalancerMember "http://127.0.0.1:8000" retry=1
    BalancerMember "http://127.0.0.1:8080" retry=1
    ProxySet lbmethod=byrequests
</Proxy>

<VirtualHost *:80>
    ServerName my-ecommerce-app.test

    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass "/" "balancer://mycluster/"
    ProxyPassReverse "/" "balancer://mycluster/"
</VirtualHost>

# -----------------------------------------------------------------------------
# 3) Local Apache backend used as one balancer target
# -----------------------------------------------------------------------------
# This backend lets Apache act as one of the two targets in the demo.
# Adjust the path if your project is not under C:/xampp/htdocs.

<VirtualHost *:8000>
    ServerName localhost
    DocumentRoot "C:/xampp/htdocs/my-ecommerce-app/public"

    <Directory "C:/xampp/htdocs/my-ecommerce-app/public">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# -----------------------------------------------------------------------------
# 4) Optional notes for the demo
# -----------------------------------------------------------------------------
# - Start the second backend with: php artisan serve --port=8080
# - Verify balancing with: GET /server-info
# - Load test with: k6 run --env BASE_URL=http://my-ecommerce-app.test scripts/k6_load_balance_demo.js
#
# Expected evidence:
# - different process_id values
# - different php_sapi values
# - alternating responses between Apache and artisan serve
